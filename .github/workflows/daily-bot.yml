name: 🤖 Daily Article Bot
on:
  schedule:
    - cron: '0 8 * * *' # רץ כל יום ב-8 בבוקר
  workflow_dispatch: # מאפשר הרצה ידנית מהממשק

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # תמיכה בגרסאות Node חדשות
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-bot.mjs

      - name: Commit and push generated article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles/
          git diff --cached --quiet || (git commit -m "🤖 Auto-generated daily article" && git push origin ${{ github.event.repository.default_branch }})
