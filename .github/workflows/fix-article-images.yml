name: 🖼️ Fix Article Images

on:
  workflow_dispatch:

jobs:
  fix-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fix article images
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: node scripts/fix-article-images.mjs

      - name: Commit and push updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles/
          git diff --cached --quiet || (git commit -m "🖼️ Fix article images with real stock photos" && git push origin ${{ github.event.repository.default_branch }})
