<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C2410C"/><stop offset="100%" stop-color="#F97316"/></linearGradient>
    <linearGradient id="dog" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D97706"/><stop offset="100%" stop-color="#B45309"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#FED7AA" opacity="0.5"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🐾 Flea on Pet Fur · פרעושים</text>
  <!-- Glow behind dog -->
  <circle cx="360" cy="320" r="200" fill="#FED7AA" opacity="0.45"/>
  <!-- Dog body (stylized flat) -->
  <ellipse cx="360" cy="350" rx="195" ry="120" fill="url(#dog)"/>
  <!-- Dog head -->
  <circle cx="540" cy="270" r="90" fill="#D97706"/>
  <!-- Ear -->
  <ellipse cx="590" cy="210" rx="32" ry="48" fill="#B45309" transform="rotate(15,590,210)"/>
  <!-- Other ear -->
  <ellipse cx="480" cy="196" rx="25" ry="40" fill="#B45309" transform="rotate(-10,480,196)"/>
  <!-- Snout -->
  <ellipse cx="610" cy="290" rx="35" ry="26" fill="#CA8A04"/>
  <!-- Nose -->
  <ellipse cx="628" cy="282" rx="10" ry="7" fill="#1C1917"/>
  <!-- Eye -->
  <circle cx="566" cy="258" r="12" fill="#1C1917"/>
  <circle cx="570" cy="254" r="4" fill="#FFFFFF" opacity="0.7"/>
  <!-- Mouth smile -->
  <path d="M600 300 Q615 314 630 300" fill="none" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <!-- Fur texture strokes -->
  <g stroke="#92400E" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M200,290 Q210,275 222,290"/><path d="M230,270 Q242,255 255,270"/>
    <path d="M260,300 Q273,284 286,300"/><path d="M290,278 Q303,262 316,278"/>
    <path d="M190,330 Q202,315 215,330"/><path d="M224,350 Q236,335 250,350"/>
    <path d="M260,330 Q272,315 285,330"/><path d="M300,355 Q312,340 326,355"/>
    <path d="M170,370 Q182,355 196,370"/><path d="M335,300 Q348,285 360,300"/>
    <path d="M370,280 Q383,265 395,280"/><path d="M400,310 Q414,294 427,310"/>
    <path d="M340,340 Q354,324 368,340"/><path d="M380,360 Q394,344 408,360"/>
    <path d="M170,410 Q184,394 198,410"/><path d="M210,400 Q224,384 238,400"/>
    <path d="M250,415 Q264,399 278,415"/><path d="M288,400 Q302,384 316,400"/>
  </g>
  <!-- FLEA (enlarged, dark, compressed oval) -->
  <g transform="translate(380,290)">
    <ellipse cx="0" cy="0" rx="26" ry="36" fill="#1C1917" transform="rotate(-20)"/>
    <ellipse cx="14" cy="-26" rx="12" ry="10" fill="#0C0A09" transform="rotate(-20)"/>
    <!-- Eye -->
    <circle cx="19" cy="-30" r="4" fill="#EF4444"/>
    <!-- Long jump legs -->
    <line x1="-10" y1="-8" x2="-50" y2="-28" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="4" x2="-52" y2="4" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="18" x2="-46" y2="44" stroke="#1C1917" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="-8" x2="50" y2="-28" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="4" x2="52" y2="4" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="18" x2="44" y2="44" stroke="#1C1917" stroke-width="4" stroke-linecap="round"/>
    <!-- Antennae -->
    <line x1="12" y1="-32" x2="24" y2="-52" stroke="#1C1917" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Magnifier circle around flea -->
  <circle cx="380" cy="290" r="72" fill="none" stroke="#C2410C" stroke-width="3" stroke-dasharray="10,6"/>
  <line x1="436" y1="346" x2="480" y2="390" stroke="#C2410C" stroke-width="4" stroke-linecap="round"/>
  <circle cx="484" cy="394" r="7" fill="#C2410C"/>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#7C2D12"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Flea on Dog Fur · פרעוש על פרווה</text>
</svg>
