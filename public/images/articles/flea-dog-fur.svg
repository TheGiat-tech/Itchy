  <!-- flea (highly magnified, laterally compressed) -->
  <g transform="translate(400,300)">
    <!-- body - compressed oval -->
    <ellipse cx="0" cy="0" rx="22" ry="30" fill="#3d1f0a" transform="rotate(-15)"/>
    <!-- head -->
    <ellipse cx="12" cy="-22" rx="10" ry="8" fill="#2e1505" transform="rotate(-15)"/>
    <!-- eye -->
    <circle cx="16" cy="-25" r="3" fill="#ff4444"/>
    <!-- legs (3 per side, long and powerful) -->
    <line x1="-8" y1="-5" x2="-40" y2="-20" stroke="#2e1505" stroke-width="2.5"/>
    <line x1="-10" y1="5" x2="-42" y2="5" stroke="#2e1505" stroke-width="2.5"/>
    <line x1="-8" y1="15" x2="-38" y2="35" stroke="#2e1505" stroke-width="3"/>
    <line x1="8" y1="-5" x2="40" y2="-20" stroke="#2e1505" stroke-width="2.5"/>
    <line x1="10" y1="5" x2="42" y2="5" stroke="#2e1505" stroke-width="2.5"/>
    <line x1="8" y1="15" x2="36" y2="35" stroke="#2e1505" stroke-width="3"/>
    <!-- antennae -->
    <line x1="10" y1="-28" x2="20" y2="-44" stroke="#2e1505" stroke-width="1.5"/>
    <line x1="14" y1="-26" x2="26" y2="-38" stroke="#2e1505" stroke-width="1.5"/>
  </g>
  <!-- label -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="578" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#fff">Flea on Dog Fur</text>
