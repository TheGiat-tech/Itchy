  <!-- cockroach 2 (smaller, on wall) -->
  <g transform="translate(560,220) scale(0.6)">
    <ellipse cx="0" cy="-45" rx="24" ry="17" fill="#8b6914"/>
    <ellipse cx="-7" cy="-45" rx="5" ry="14" fill="#3a1e04" opacity="0.9"/>
    <ellipse cx="7" cy="-45" rx="5" ry="14" fill="#3a1e04" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="26" ry="48" fill="#8b6914"/>
    <line x1="-24" y1="-25" x2="-58" y2="-44" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="-25" y1="0" x2="-60" y2="0" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="24" y1="-25" x2="58" y2="-44" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="25" y1="0" x2="60" y2="0" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="-12" y1="-58" x2="-50" y2="-108" stroke="#5a3808" stroke-width="2"/>
    <line x1="12" y1="-58" x2="50" y2="-108" stroke="#5a3808" stroke-width="2"/>
  </g>
  <!-- light switch glow (flashlight effect) -->
  <radialGradient id="light" cx="40%" cy="65%" r="35%">
    <stop offset="0%" stop-color="#fffde0" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="800" height="600" fill="url(#light)"/>
  <!-- label -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,0,0,0.7)"/>
  <text x="400" y="578" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#fff">Cockroach Infestation in the Kitchen</text>
</svg>
