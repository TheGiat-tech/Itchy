  <!-- cockroach 1 (large, on counter) -->
  <g transform="translate(320,370)">
    <ellipse cx="0" cy="-45" rx="24" ry="17" fill="#8b6914"/>
    <ellipse cx="-7" cy="-45" rx="5" ry="14" fill="#3a1e04" opacity="0.9"/>
    <ellipse cx="7" cy="-45" rx="5" ry="14" fill="#3a1e04" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="26" ry="48" fill="#8b6914"/>
    <ellipse cx="-16" cy="-2" rx="12" ry="42" fill="#7a5810" opacity="0.6" transform="rotate(-6,-16,-2)"/>
    <ellipse cx="16" cy="-2" rx="12" ry="42" fill="#7a5810" opacity="0.6" transform="rotate(6,16,-2)"/>
    <line x1="-24" y1="-25" x2="-58" y2="-44" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="-58" y1="-44" x2="-72" y2="-26" stroke="#5a3808" stroke-width="2"/>
    <line x1="-25" y1="0" x2="-60" y2="0" stroke="#5a3808" stroke-width="2.5"/>
    <line x1="-24" y1="22" x2="-56" y2="40" stroke="#5a3808" stroke-width="2.5"/>
