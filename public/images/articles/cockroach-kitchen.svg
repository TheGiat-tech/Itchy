  <rect x="580" y="278" width="52" height="10" rx="4" fill="#aaa"/>
  <!-- kitchen tiles (backsplash) -->
  <g stroke="#333" stroke-width="1" fill="none">
    <rect x="0" y="0" width="100" height="80"/>
    <rect x="100" y="0" width="100" height="80"/>
    <rect x="200" y="0" width="100" height="80"/>
    <rect x="300" y="0" width="100" height="80"/>
    <rect x="400" y="0" width="100" height="80"/>
    <rect x="500" y="0" width="100" height="80"/>
    <rect x="600" y="0" width="100" height="80"/>
    <rect x="700" y="0" width="100" height="80"/>
    <rect x="0" y="80" width="100" height="80"/>
    <rect x="100" y="80" width="100" height="80"/>
    <rect x="200" y="80" width="100" height="80"/>
    <rect x="300" y="80" width="100" height="80"/>
    <rect x="400" y="80" width="100" height="80"/>
    <rect x="500" y="80" width="100" height="80"/>
    <rect x="600" y="80" width="100" height="80"/>
    <rect x="700" y="80" width="100" height="80"/>
    <rect x="0" y="160" width="100" height="80"/>
    <rect x="100" y="160" width="100" height="80"/>
    <rect x="200" y="160" width="100" height="80"/>
    <rect x="300" y="160" width="100" height="80"/>
    <rect x="400" y="160" width="100" height="80"/>
    <rect x="500" y="160" width="100" height="80"/>
    <rect x="600" y="160" width="100" height="80"/>
    <rect x="700" y="160" width="100" height="80"/>
    <rect x="0" y="240" width="100" height="80"/>
    <rect x="100" y="240" width="100" height="80"/>
    <rect x="200" y="240" width="100" height="80"/>
    <rect x="300" y="240" width="100" height="80"/>
    <rect x="400" y="240" width="100" height="80"/>
    <rect x="500" y="240" width="100" height="80"/>
    <rect x="600" y="240" width="100" height="80"/>
    <rect x="700" y="240" width="100" height="80"/>
