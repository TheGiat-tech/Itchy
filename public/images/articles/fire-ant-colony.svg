    <ellipse cx="18" cy="-3" rx="10" ry="7"/>
    <ellipse cx="-14" cy="3" rx="11" ry="7"/>
    <line x1="-6" y1="5" x2="-22" y2="14" stroke="#B91C1C" stroke-width="3" stroke-linecap="round"/>
