<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9F1239"/><stop offset="100%" stop-color="#F43F5E"/></linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#92400E"/><stop offset="100%" stop-color="#78350F"/></linearGradient>
    <linearGradient id="mound" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B45309"/><stop offset="100%" stop-color="#92400E"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#FED7AA" opacity="0.5"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
