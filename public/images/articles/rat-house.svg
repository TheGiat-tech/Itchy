<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#2a2420"/>
  <!-- attic floorboards -->
  <rect x="0" y="440" width="800" height="160" fill="#4a3820"/>
  <g stroke="#3a2810" stroke-width="2">
    <line x1="0" y1="455" x2="800" y2="455"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="505" x2="800" y2="505"/>
    <line x1="0" y1="530" x2="800" y2="530"/>
    <!-- plank lines -->
    <line x1="120" y1="440" x2="120" y2="600"/>
    <line x1="280" y1="440" x2="280" y2="600"/>
    <line x1="440" y1="440" x2="440" y2="600"/>
    <line x1="600" y1="440" x2="600" y2="600"/>
    <line x1="760" y1="440" x2="760" y2="600"/>
  </g>
  <!-- gnawed cardboard box on floor -->
  <rect x="560" y="380" width="160" height="110" rx="5" fill="#c8a46a" stroke="#a08040" stroke-width="2"/>
  <!-- gnaw marks on box -->
  <path d="M560,400 Q575,395 590,402 Q605,408 620,400" stroke="#7a5020" stroke-width="3" fill="none"/>
  <path d="M560,415 Q570,410 580,417" stroke="#7a5020" stroke-width="2.5" fill="none"/>
  <!-- droppings near box -->
  <ellipse cx="590" cy="445" rx="5" ry="8" fill="#1a1208" transform="rotate(20,590,445)"/>
  <ellipse cx="615" cy="450" rx="4" ry="7" fill="#1a1208" transform="rotate(-10,615,450)"/>
  <ellipse cx="640" cy="442" rx="5" ry="8" fill="#1a1208" transform="rotate(5,640,442)"/>
  <!-- RAT -->
  <g transform="translate(350,400)">
    <!-- tail -->
    <path d="M-60,40 Q-100,60 -130,50 Q-160,40 -170,55" stroke="#7a5040" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- body -->
    <ellipse cx="0" cy="0" rx="75" ry="45" fill="#7a6050"/>
    <!-- fur texture -->
    <ellipse cx="0" cy="0" rx="72" ry="42" fill="none" stroke="#6a5040" stroke-width="1" stroke-dasharray="4,6"/>
    <!-- head -->
    <ellipse cx="70" cy="-10" rx="40" ry="32" fill="#7a6050"/>
    <!-- snout -->
    <ellipse cx="105" cy="-8" rx="14" ry="10" fill="#6a5040"/>
    <!-- nose -->
    <ellipse cx="118" cy="-8" rx="5" ry="4" fill="#cc6666"/>
    <!-- eye (beady) -->
    <circle cx="88" cy="-25" r="7" fill="#1a1a1a"/>
    <circle cx="90" cy="-27" r="2" fill="#444" opacity="0.8"/>
    <!-- ear -->
    <ellipse cx="64" cy="-38" rx="14" ry="18" fill="#9a7060"/>
    <ellipse cx="64" cy="-38" rx="9" ry="12" fill="#c07080"/>
    <!-- whiskers -->
    <line x1="110" y1="-12" x2="150" y2="-20" stroke="#d0c0b0" stroke-width="1.5"/>
    <line x1="110" y1="-8" x2="152" y2="-8" stroke="#d0c0b0" stroke-width="1.5"/>
    <line x1="110" y1="-4" x2="148" y2="4" stroke="#d0c0b0" stroke-width="1.5"/>
    <line x1="110" y1="-12" x2="75" y2="-22" stroke="#d0c0b0" stroke-width="1.5"/>
    <line x1="110" y1="-8" x2="72" y2="-10" stroke="#d0c0b0" stroke-width="1.5"/>
    <!-- feet -->
    <ellipse cx="-30" cy="42" rx="18" ry="9" fill="#5a4030"/>
    <ellipse cx="20" cy="44" rx="18" ry="9" fill="#5a4030"/>
    <!-- claws front foot -->
    <line x1="6" y1="50" x2="2" y2="60" stroke="#3a2818" stroke-width="2"/>
    <line x1="14" y1="51" x2="12" y2="62" stroke="#3a2818" stroke-width="2"/>
    <line x1="22" y1="51" x2="22" y2="62" stroke="#3a2818" stroke-width="2"/>
    <line x1="30" y1="50" x2="32" y2="60" stroke="#3a2818" stroke-width="2"/>
  </g>
  <!-- label -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,0,0,0.7)"/>
  <text x="400" y="578" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#fff">Rat in the House – Rodent Infestation</text>
</svg>
