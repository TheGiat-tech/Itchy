<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F1F5F9"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
    <linearGradient id="rat" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9CA3AF"/><stop offset="100%" stop-color="#6B7280"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#CBD5E1" opacity="0.5"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🐀 Rat in the House · עכברים ועכברושים</text>
  <!-- House shape -->
  <rect x="160" y="240" width="480" height="280" rx="6" fill="url(#house)" stroke="#94A3B8" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="400,108 130,242 670,242" fill="#475569"/>
  <polygon points="400,108 145,240 160,240 400,116 640,240 655,240" fill="#334155"/>
  <!-- House windows -->
  <rect x="200" y="295" width="90" height="80" rx="8" fill="#BFDBFE" stroke="#93C5FD" stroke-width="2"/>
  <line x1="245" y1="295" x2="245" y2="375" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="200" y1="335" x2="290" y2="335" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="510" y="295" width="90" height="80" rx="8" fill="#BFDBFE" stroke="#93C5FD" stroke-width="2"/>
  <line x1="555" y1="295" x2="555" y2="375" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="510" y1="335" x2="600" y2="335" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- House door -->
  <rect x="350" y="385" width="100" height="135" rx="8" fill="#94A3B8" stroke="#64748B" stroke-width="2"/>
  <rect x="360" y="395" width="36" height="55" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="404" y="395" width="36" height="55" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1.5"/>
  <circle cx="394" cy="462" r="7" fill="#F59E0B"/>
  <!-- Chimney -->
  <rect x="530" y="136" width="48" height="72" rx="3" fill="#475569" stroke="#334155" stroke-width="1.5"/>
  <rect x="524" y="130" width="60" height="14" rx="3" fill="#334155"/>
  <!-- Ground / floor -->
  <rect x="0" y="510" width="800" height="90" fill="#0F172A"/>
  <!-- RAT (flat stylized) -->
  <g transform="translate(510,450)">
    <!-- Tail -->
    <path d="M-72,30 Q-115,55 -150,44 Q-178,34 -185,52" stroke="#9CA3AF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="80" ry="46" fill="url(#rat)"/>
    <!-- Head -->
    <ellipse cx="72" cy="-12" rx="42" ry="34" fill="#9CA3AF"/>
    <!-- Snout -->
    <ellipse cx="108" cy="-10" rx="16" ry="12" fill="#6B7280"/>
    <!-- Nose -->
    <ellipse cx="123" cy="-10" rx="6" ry="5" fill="#F9A8D4"/>
    <!-- Eye -->
    <circle cx="92" cy="-28" r="8" fill="#1C1917"/>
    <circle cx="95" cy="-31" r="3" fill="#FFFFFF" opacity="0.65"/>
    <!-- Ear -->
    <ellipse cx="60" cy="-42" rx="16" ry="20" fill="#9CA3AF"/>
    <ellipse cx="60" cy="-42" rx="10" ry="13" fill="#F9A8D4"/>
    <!-- Whiskers -->
    <line x1="114" y1="-14" x2="154" y2="-22" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="114" y1="-10" x2="156" y2="-10" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="114" y1="-6" x2="152" y2="2" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="114" y1="-14" x2="78" y2="-24" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-32" cy="44" rx="20" ry="9" fill="#64748B"/>
    <ellipse cx="18" cy="46" rx="20" ry="9" fill="#64748B"/>
    <!-- Claws front -->
    <line x1="6" y1="52" x2="2" y2="62" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="54" x2="12" y2="64" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="54" x2="22" y2="64" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="52" x2="32" y2="62" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Bottom label -->
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Rat in the House · עכברוש בבית</text>
</svg>
