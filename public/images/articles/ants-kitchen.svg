<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#DCFCE7"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#15803D"/><stop offset="100%" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" id="glow" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#86EFAC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#86EFAC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#86EFAC" opacity="0.45"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <!-- Top accent bar -->
  <rect width="800" height="72" fill="url(#top)" rx="0"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" opacity="0.95">🐜 Ants in the Kitchen</text>
  <!-- Glow circle behind ant group -->
  <circle cx="400" cy="290" r="190" fill="#BBF7D0" opacity="0.5"/>
  <!-- Counter surface -->
  <rect x="0" y="400" width="800" height="120" rx="0" fill="#FFFFFF" opacity="0.55"/>
  <rect x="0" y="395" width="800" height="12" fill="#4ADE80" opacity="0.7"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="130" width="180" height="260" rx="10" fill="#FFFFFF" opacity="0.45" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="80" y="150" width="140" height="100" rx="6" fill="none" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="80" y="265" width="140" height="100" rx="6" fill="none" stroke="#86EFAC" stroke-width="1.5"/>
  <circle cx="152" cy="200" r="7" fill="#4ADE80" opacity="0.6"/>
  <circle cx="152" cy="315" r="7" fill="#4ADE80" opacity="0.6"/>
  <!-- Tile wall -->
  <g opacity="0.18" stroke="#15803D" stroke-width="1" fill="none">
    <rect x="280" y="90" width="110" height="80"/><rect x="390" y="90" width="110" height="80"/><rect x="500" y="90" width="110" height="80"/><rect x="610" y="90" width="110" height="80"/>
    <rect x="280" y="170" width="110" height="80"/><rect x="390" y="170" width="110" height="80"/><rect x="500" y="170" width="110" height="80"/><rect x="610" y="170" width="110" height="80"/>
    <rect x="280" y="250" width="110" height="80"/><rect x="390" y="250" width="110" height="80"/><rect x="500" y="250" width="110" height="80"/><rect x="610" y="250" width="110" height="80"/>
    <rect x="280" y="330" width="110" height="68"/><rect x="390" y="330" width="110" height="68"/><rect x="500" y="330" width="110" height="68"/><rect x="610" y="330" width="110" height="68"/>
  </g>
  <!-- Sugar jar -->
  <rect x="598" y="330" width="80" height="70" rx="12" fill="#FFFFFF" stroke="#4ADE80" stroke-width="2.5"/>
  <ellipse cx="638" cy="330" rx="40" ry="12" fill="#FFFFFF" stroke="#4ADE80" stroke-width="2.5"/>
  <ellipse cx="638" cy="320" rx="22" ry="8" fill="#F0FDF4" stroke="#4ADE80" stroke-width="2"/>
  <text x="638" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#15803D" font-weight="600">sugar</text>
  <!-- ANT 1 (center, large) -->
  <g transform="translate(400,385)" fill="#14532D">
    <ellipse cx="0" cy="0" rx="16" ry="10"/>
    <ellipse cx="25" cy="-4" rx="13" ry="9"/>
    <ellipse cx="-19" cy="4" rx="14" ry="9"/>
    <line x1="-7" y1="6" x2="-28" y2="18" stroke="#14532D" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="-5" y2="20" stroke="#14532D" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="6" x2="26" y2="16" stroke="#14532D" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-7" y1="-5" x2="-28" y2="-16" stroke="#14532D" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="-5" x2="26" y2="-14" stroke="#14532D" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="34" y1="-6" x2="58" y2="-26" stroke="#14532D" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="-2" x2="60" y2="-4" stroke="#14532D" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- ANT 2 (left) -->
  <g transform="translate(240,390)" fill="#166534">
    <ellipse cx="0" cy="0" rx="13" ry="8"/>
    <ellipse cx="20" cy="-3" rx="11" ry="7"/>
    <ellipse cx="-15" cy="3" rx="12" ry="7"/>
    <line x1="-6" y1="5" x2="-22" y2="14" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="5" x2="20" y2="13" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-4" x2="-22" y2="-13" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="-4" x2="20" y2="-11" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="27" y1="-5" x2="46" y2="-20" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="-2" x2="48" y2="-4" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- ANT 3 (right) -->
  <g transform="translate(540,392)" fill="#166534">
    <ellipse cx="0" cy="0" rx="13" ry="8"/>
    <ellipse cx="20" cy="-3" rx="11" ry="7"/>
    <ellipse cx="-15" cy="3" rx="12" ry="7"/>
    <line x1="-6" y1="5" x2="-22" y2="14" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="5" x2="20" y2="13" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-4" x2="-22" y2="-13" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <line x1="27" y1="-5" x2="46" y2="-20" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Trail dots -->
  <g fill="#15803D" opacity="0.55">
    <circle cx="140" cy="392" r="4"/><circle cx="165" cy="390" r="4"/><circle cx="190" cy="388" r="4"/>
    <circle cx="640" cy="394" r="3.5"/><circle cx="660" cy="392" r="3.5"/>
  </g>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#14532D"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Ants in the Kitchen · נמלים במטבח</text>
</svg>
