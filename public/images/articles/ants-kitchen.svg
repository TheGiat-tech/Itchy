<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f5e6cc"/>
  <!-- counter surface -->
  <rect x="0" y="400" width="800" height="200" fill="#d4a97a"/>
  <rect x="0" y="395" width="800" height="12" fill="#b8874e"/>
  <!-- ant 1 (center) -->
  <g transform="translate(360,350)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1a1a1a"/>
    <ellipse cx="14" cy="-3" rx="8" ry="6" fill="#1a1a1a"/>
    <ellipse cx="-13" cy="2" rx="9" ry="6" fill="#1a1a1a"/>
    <!-- legs -->
    <line x1="-5" y1="3" x2="-20" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="0" y1="4" x2="-8" y2="16" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="3" x2="18" y2="10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-5" y1="-2" x2="-20" y2="-10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="0" y1="-3" x2="-8" y2="-15" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="-2" x2="18" y2="-8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- antennae -->
    <line x1="20" y1="-5" x2="36" y2="-18" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="20" y1="-2" x2="38" y2="-6" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <!-- ant 2 -->
  <g transform="translate(260,365)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1a1a1a"/>
    <ellipse cx="14" cy="-3" rx="8" ry="6" fill="#1a1a1a"/>
    <ellipse cx="-13" cy="2" rx="9" ry="6" fill="#1a1a1a"/>
    <line x1="-5" y1="3" x2="-20" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="3" x2="18" y2="10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-5" y1="-2" x2="-20" y2="-10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="-2" x2="18" y2="-8" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="20" y1="-5" x2="36" y2="-18" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="20" y1="-2" x2="38" y2="-6" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <!-- ant 3 -->
  <g transform="translate(470,358)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#1a1a1a"/>
    <ellipse cx="14" cy="-3" rx="8" ry="6" fill="#1a1a1a"/>
    <ellipse cx="-13" cy="2" rx="9" ry="6" fill="#1a1a1a"/>
    <line x1="-5" y1="3" x2="-20" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="3" x2="18" y2="10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-5" y1="-2" x2="-20" y2="-10" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="5" y1="-2" x2="18" y2="-8" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="20" y1="-5" x2="36" y2="-18" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <!-- sugar bowl hint -->
  <ellipse cx="580" cy="390" rx="60" ry="20" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <rect x="520" y="340" width="120" height="50" rx="8" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="580" y="370" text-anchor="middle" font-size="13" fill="#aaa">sugar</text>
  <!-- label -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="578" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#fff">Ants in the Kitchen</text>
</svg>
