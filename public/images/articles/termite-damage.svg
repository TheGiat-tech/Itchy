    <line x1="-4" y1="-3" x2="-14" y2="-8" stroke="#A16207" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="12" y2="-7" stroke="#A16207" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="-3" x2="30" y2="-12" stroke="#A16207" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="-1" x2="32" y2="-2" stroke="#A16207" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(480,296)" fill="url(#termite)">
