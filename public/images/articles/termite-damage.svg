  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🪵 Termite Wood Damage · נזקי טרמיטים</text>
