<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F9FF"/><stop offset="100%" stop-color="#E0F2FE"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0369A1"/><stop offset="100%" stop-color="#0EA5E9"/></linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="tank" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#16A34A"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#BAE6FD" opacity="0.5"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🔬 Eco Pest Control · הדברה ירוקה</text>
  <!-- Floor -->
  <rect x="0" y="460" width="800" height="50" fill="#FFFFFF" opacity="0.45"/>
  <rect x="0" y="455" width="800" height="10" fill="#BAE6FD" opacity="0.6"/>
  <!-- Background house outline (subtle) -->
  <g opacity="0.08" fill="#0369A1">
    <polygon points="400,120 560,240 560,470 240,470 240,240"/>
    <polygon points="400,88 590,225 210,225"/>
  </g>
  <!-- TECHNICIAN figure (clean flat icon style) -->
  <!-- Legs -->
  <rect x="348" y="380" width="44" height="110" rx="14" fill="url(#suit)" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="408" y="380" width="44" height="110" rx="14" fill="url(#suit)" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Boots -->
  <rect x="340" y="462" width="58" height="28" rx="8" fill="#334155"/>
  <rect x="400" y="462" width="58" height="28" rx="8" fill="#334155"/>
  <!-- Torso -->
  <rect x="330" y="238" width="140" height="156" rx="18" fill="url(#suit)" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Logo patch (green, eco) -->
  <rect x="348" y="258" width="52" height="36" rx="7" fill="url(#tank)"/>
  <text x="374" y="281" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#FFFFFF" font-weight="700">ECO</text>
  <!-- Right arm (holding wand) -->
  <rect x="470" y="248" width="38" height="120" rx="14" fill="url(#suit)" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Left arm -->
  <rect x="292" y="248" width="38" height="110" rx="14" fill="url(#suit)" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Gloves -->
  <ellipse cx="311" cy="365" rx="22" ry="15" fill="#FEF08A" stroke="#CA8A04" stroke-width="1.5"/>
  <ellipse cx="489" cy="373" rx="22" ry="15" fill="#FEF08A" stroke="#CA8A04" stroke-width="1.5"/>
  <!-- Spray wand -->
  <rect x="485" y="330" width="9" height="120" rx="4" fill="#475569"/>
  <!-- Spray nozzle -->
  <rect x="494" y="430" width="50" height="9" rx="4" fill="#475569"/>
  <ellipse cx="546" cy="434" rx="8" ry="8" fill="#64748B"/>
  <!-- Spray mist droplets -->
  <circle cx="568" cy="428" r="7" fill="#7DD3FC" opacity="0.7"/>
  <circle cx="582" cy="418" r="5" fill="#BAE6FD" opacity="0.65"/>
  <circle cx="596" cy="432" r="4" fill="#7DD3FC" opacity="0.6"/>
  <circle cx="575" cy="442" r="4" fill="#BAE6FD" opacity="0.55"/>
  <circle cx="590" cy="412" r="3" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="606" cy="424" r="3" fill="#BAE6FD" opacity="0.5"/>
  <!-- Tank on back -->
  <rect x="460" y="244" width="34" height="80" rx="12" fill="url(#tank)" stroke="#15803D" stroke-width="2"/>
  <ellipse cx="477" cy="244" rx="17" ry="8" fill="#4ADE80"/>
  <ellipse cx="477" cy="324" rx="17" ry="8" fill="#16A34A"/>
  <!-- Head -->
  <circle cx="400" cy="196" r="58" fill="url(#suit)" stroke="#CBD5E1" stroke-width="2"/>
  <!-- Face shield visor -->
  <ellipse cx="400" cy="202" rx="38" ry="32" fill="#BAE6FD" opacity="0.65" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Helmet top stripe -->
  <rect x="342" y="155" width="116" height="22" rx="6" fill="url(#top)"/>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#0C4A6E"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Pest Control Technician · מדביר מוסמך</text>
</svg>
