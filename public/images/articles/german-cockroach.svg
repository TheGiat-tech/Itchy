<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFBEB"/><stop offset="100%" stop-color="#FEF3C7"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#92400E"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CA8A04"/><stop offset="100%" stop-color="#A16207"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#FDE68A" opacity="0.5"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🪳 German Cockroach · תיקן גרמני</text>
  <!-- Glow -->
  <circle cx="400" cy="300" r="210" fill="#FEF08A" opacity="0.35"/>
  <!-- Kitchen counter context -->
  <rect x="0" y="430" width="800" height="80" fill="#FFFFFF" opacity="0.5"/>
  <rect x="0" y="424" width="800" height="12" fill="#FDE68A" opacity="0.8"/>
  <!-- COCKROACH body (centered, large, flat illustration) -->
  <g transform="translate(400,300)">
    <!-- Wings -->
    <ellipse cx="-22" cy="10" rx="20" ry="65" fill="#B45309" opacity="0.7" transform="rotate(-8,-22,10)"/>
    <ellipse cx="22" cy="10" rx="20" ry="65" fill="#B45309" opacity="0.7" transform="rotate(8,22,10)"/>
    <!-- Abdomen -->
    <ellipse cx="0" cy="15" rx="32" ry="70" fill="url(#body)"/>
    <!-- Abdomen segments -->
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="-31" y1="-5" x2="31" y2="-5" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="-32" y1="10" x2="32" y2="10" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="-31" y1="25" x2="31" y2="25" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="40" x2="30" y2="40" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <!-- Pronotum (head shield) -->
    <ellipse cx="0" cy="-68" rx="32" ry="22" fill="#A16207"/>
    <!-- Dark stripes on pronotum (German cockroach signature) -->
    <ellipse cx="-9" cy="-68" rx="7" ry="18" fill="#1C1917" opacity="0.8"/>
    <ellipse cx="9" cy="-68" rx="7" ry="18" fill="#1C1917" opacity="0.8"/>
    <!-- Head -->
    <ellipse cx="0" cy="-90" rx="18" ry="14" fill="#78350F"/>
    <!-- Eyes -->
    <circle cx="-9" cy="-94" r="5" fill="#1C1917"/>
    <circle cx="9" cy="-94" r="5" fill="#1C1917"/>
    <circle cx="-7" cy="-96" r="2" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="11" cy="-96" r="2" fill="#FFFFFF" opacity="0.6"/>
    <!-- Long antennae -->
    <path d="M-10,-100 Q-35,-140 -60,-175" fill="none" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-60,-175 Q-85,-205 -100,-195" fill="none" stroke="#78350F" stroke-width="2" stroke-linecap="round"/>
    <path d="M10,-100 Q35,-140 60,-175" fill="none" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M60,-175 Q85,-205 100,-195" fill="none" stroke="#78350F" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs (3 pairs) -->
    <line x1="-30" y1="-40" x2="-80" y2="-65" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="-65" x2="-100" y2="-44" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-31" y1="-10" x2="-82" y2="-10" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="-82" y1="-10" x2="-100" y2="14" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-30" y1="22" x2="-78" y2="48" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="-78" y1="48" x2="-94" y2="70" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="-40" x2="80" y2="-65" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="-65" x2="100" y2="-44" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="-10" x2="82" y2="-10" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="82" y1="-10" x2="100" y2="14" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="22" x2="78" y2="48" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="78" y1="48" x2="94" y2="70" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Species badge -->
  <rect x="580" y="90" width="185" height="52" rx="10" fill="#FFFFFF" opacity="0.85" stroke="#FDE68A" stroke-width="2"/>
  <text x="673" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#92400E" font-weight="700">Blattella germanica</text>
  <text x="673" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#A16207">German Cockroach</text>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#451A03"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">German Cockroach · תיקן גרמני</text>
</svg>
