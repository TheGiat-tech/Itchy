<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E1B4B"/><stop offset="100%" stop-color="#2E1065"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4C1D95"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="abdomen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#92400E"/><stop offset="100%" stop-color="#78350F"/></linearGradient>
    <linearGradient id="ceph" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A16207"/><stop offset="100%" stop-color="#78350F"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Subtle web pattern background -->
  <g stroke="#4C1D95" stroke-width="0.7" opacity="0.3" fill="none">
    <line x1="400" y1="72" x2="100" y2="420"/><line x1="400" y1="72" x2="200" y2="440"/><line x1="400" y1="72" x2="320" y2="450"/><line x1="400" y1="72" x2="400" y2="450"/>
    <line x1="400" y1="72" x2="480" y2="450"/><line x1="400" y1="72" x2="600" y2="440"/><line x1="400" y1="72" x2="700" y2="420"/>
    <path d="M125,160 Q400,130 675,160"/><path d="M105,220 Q400,185 695,220"/><path d="M100,285 Q400,246 700,285"/>
    <path d="M102,350 Q400,308 698,350"/><path d="M108,415 Q400,370 692,415"/>
  </g>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">☠ Venomous Spider · עכביש ארסי</text>
  <!-- Glow circle -->
  <circle cx="400" cy="295" r="205" fill="#4C1D95" opacity="0.35"/>
  <!-- BROWN RECLUSE SPIDER (large, centered) -->
  <g transform="translate(400,295)">
    <!-- Abdomen (rounded rear) -->
    <ellipse cx="-50" cy="10" rx="62" ry="46" fill="url(#abdomen)"/>
    <!-- Cephalothorax (front plate) -->
    <ellipse cx="30" cy="0" rx="50" ry="40" fill="url(#ceph)"/>
    <!-- Violin mark on cephalothorax (darker) -->
    <ellipse cx="24" cy="-2" rx="20" ry="26" fill="#451A03"/>
    <!-- Neck of violin -->
    <rect x="15" y="18" width="14" height="18" rx="4" fill="#451A03"/>
    <!-- Six eyes in pairs -->
    <circle cx="44" cy="-24" r="5.5" fill="#111"/>
    <circle cx="56" cy="-24" r="5.5" fill="#111"/>
    <circle cx="38" cy="-14" r="4.5" fill="#111"/>
    <circle cx="62" cy="-14" r="4.5" fill="#111"/>
    <circle cx="36" cy="-4" r="4" fill="#111"/>
    <circle cx="64" cy="-4" r="4" fill="#111"/>
    <!-- Eye shine -->
    <circle cx="46" cy="-26" r="2" fill="#A78BFA" opacity="0.7"/>
    <circle cx="58" cy="-26" r="2" fill="#A78BFA" opacity="0.7"/>
    <!-- Chelicerae -->
    <ellipse cx="74" cy="10" rx="12" ry="8" fill="#78350F" transform="rotate(18,74,10)"/>
    <ellipse cx="84" cy="20" rx="9" ry="6" fill="#451A03"/>
    <!-- 8 legs (4 per side, long, articulated) -->
    <!-- Left legs -->
    <line x1="14" y1="-22" x2="-38" y2="-80" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="-38" y1="-80" x2="-80" y2="-110" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="-110" x2="-110" y2="-85" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-52" y2="-40" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="-52" y1="-40" x2="-108" y2="-36" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-108" y1="-36" x2="-145" y2="-8" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="-56" y2="16" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="-56" y1="16" x2="-110" y2="44" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-110" y1="44" x2="-142" y2="74" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-2" y1="28" x2="-46" y2="70" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="-46" y1="70" x2="-76" y2="106" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-76" y1="106" x2="-96" y2="138" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right legs -->
    <line x1="46" y1="-28" x2="98" y2="-88" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="98" y1="-88" x2="140" y2="-118" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="140" y1="-118" x2="168" y2="-92" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="-12" x2="112" y2="-42" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="112" y1="-42" x2="164" y2="-36" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="164" y1="-36" x2="196" y2="-6" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="58" y1="8" x2="114" y2="18" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="114" y1="18" x2="164" y2="50" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="164" y1="50" x2="190" y2="82" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="26" x2="96" y2="68" stroke="#92400E" stroke-width="4" stroke-linecap="round"/>
    <line x1="96" y1="68" x2="122" y2="108" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <line x1="122" y1="108" x2="138" y2="142" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Danger badge -->
  <circle cx="660" cy="130" r="48" fill="#FFFFFF" opacity="0.12" stroke="#EF4444" stroke-width="2.5"/>
  <text x="660" y="122" text-anchor="middle" font-size="32" fill="#EF4444">☠</text>
  <text x="660" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#FCA5A5" font-weight="700">VENOMOUS</text>
  <!-- Subtle floor -->
  <rect x="0" y="468" width="800" height="42" fill="#1E1B4B" opacity="0.6"/>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#3B0764"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Brown Recluse Spider · ששן חום</text>
</svg>
