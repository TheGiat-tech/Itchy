<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="mattress" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F1F5F9"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1.2" fill="#93C5FD" opacity="0.4"/></pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="72" fill="url(#top)"/>
  <text x="32" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🛏 Bed Bugs · פשפשי מיטה</text>
  <!-- Glow -->
  <circle cx="400" cy="310" r="200" fill="#BFDBFE" opacity="0.4"/>
  <!-- Bed frame -->
  <rect x="80" y="200" width="640" height="300" rx="20" fill="url(#mattress)" stroke="#BFDBFE" stroke-width="3"/>
  <!-- Pillow -->
  <rect x="120" y="220" width="200" height="90" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="140" y="236" width="160" height="58" rx="12" fill="#EFF6FF"/>
  <!-- Mattress tufts -->
  <circle cx="380" cy="310" r="10" fill="#E2E8F0"/>
  <circle cx="500" cy="310" r="10" fill="#E2E8F0"/>
  <circle cx="620" cy="310" r="10" fill="#E2E8F0"/>
  <circle cx="440" cy="390" r="10" fill="#E2E8F0"/>
  <circle cx="560" cy="390" r="10" fill="#E2E8F0"/>
  <!-- Mattress stripes -->
  <rect x="80" y="200" width="640" height="35" rx="0" fill="#DBEAFE" opacity="0.4"/>
  <rect x="80" y="455" width="640" height="35" rx="0" fill="#DBEAFE" opacity="0.25"/>
  <!-- Mattress stitching -->
  <line x1="100" y1="235" x2="700" y2="235" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="8,6"/>
  <line x1="100" y1="455" x2="700" y2="455" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="8,6"/>
  <!-- BED BUG (large, flat oval, reddish-brown) -->
  <g transform="translate(390,350)">
    <ellipse cx="0" cy="0" rx="38" ry="24" fill="#92400E"/>
    <ellipse cx="30" cy="0" rx="15" ry="12" fill="#7C2D12"/>
    <!-- Segmentation -->
    <line x1="-28" y1="-16" x2="-28" y2="16" stroke="#78350F" stroke-width="2"/>
    <line x1="-10" y1="-21" x2="-10" y2="21" stroke="#78350F" stroke-width="2"/>
    <line x1="8" y1="-22" x2="8" y2="22" stroke="#78350F" stroke-width="2"/>
    <!-- Legs (3 per side) -->
    <line x1="-18" y1="-18" x2="-46" y2="-36" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="-14" y2="-44" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="-20" x2="24" y2="-44" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="18" x2="-46" y2="36" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="-14" y2="44" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="20" x2="24" y2="44" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <!-- Antennae -->
    <line x1="42" y1="-8" x2="68" y2="-24" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="4" x2="68" y2="16" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="40" cy="-7" r="3.5" fill="#1C1917"/>
    <circle cx="40" cy="7" r="3.5" fill="#1C1917"/>
  </g>
  <!-- Small bug 2 -->
  <g transform="translate(220,410) scale(0.55)">
    <ellipse cx="0" cy="0" rx="38" ry="24" fill="#92400E"/>
    <ellipse cx="30" cy="0" rx="15" ry="12" fill="#7C2D12"/>
    <line x1="-18" y1="-18" x2="-46" y2="-36" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="18" x2="-46" y2="36" stroke="#78350F" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="-8" x2="68" y2="-24" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Warning badge -->
  <circle cx="680" cy="130" r="42" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2.5"/>
  <text x="680" y="122" text-anchor="middle" font-size="26" fill="#B91C1C">⚠</text>
  <text x="680" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#B91C1C" font-weight="700">BEWARE</text>
  <!-- Bottom label -->
  <rect y="510" width="800" height="90" fill="#1E3A8A"/>
  <text x="400" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Bed Bug on Mattress · פשפש המיטה</text>
</svg>
